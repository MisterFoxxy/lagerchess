
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лагерь — список участников</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      font-family: Arial, sans-serif;
      color: #222;
      padding: 24px 16px;
    }

    .wrap {
      max-width: 760px;
      margin: 40px auto;
      padding: 22px 28px 24px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      border-radius: 4px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    h2 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.2;
    }

    #avg {
      text-align: center;
      margin-top: 0;
      margin-bottom: 18px;
      font-weight: 700;
      font-size: 17px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      background: transparent;
    }

    th, td {
      border: 1px solid rgba(0, 0, 0, 0.10);
      padding: 10px 10px;
      text-align: left;
      background: rgba(255, 255, 255, 0.18);
    }

    th {
      background: rgba(255, 255, 255, 0.28);
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }

    th:hover {
      background: rgba(255, 255, 255, 0.40);
    }

    td:nth-child(1),
    td:nth-child(3),
    td:nth-child(4),
    td:nth-child(5) {
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px 6px;
        font-size: 12px;
      }

      .wrap {
        margin: 12px auto;
        padding: 12px 10px 14px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }

      #avg {
        font-size: 13px;
        margin-bottom: 12px;
      }

      th, td {
        padding: 5px 6px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Смена 21-27.06.2026</h2>
    <div id="avg"></div>

    <table id="tab">
      <thead>
        <tr id="hdr"></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

,"id":"561633","rt":"1000"},{"group":"Смена 21-27.06.2026","fullName":"Дука  Михаил  Юрьевич","birth":"2015","id":"","rt":"1000"},{"group":"Смена 21-27.06.2026","fullName":"Пахомов Эйтан Михайлович","birth":"2018","id":"","rt":"1000"},{"group":"Смена 21-27.06.2026","fullName":"Пахомов Натан Михаилович","birth":"2020","id":"","rt":"1000"},{"group":"Смена 21-27.06.2026","fullName":"Черняева София Андреевна","birth":"2015","id":"749357","rt":"1000"}];
    var col = 'rt';
    var asc = false;

    function sortBy(c) {
      if (col === c) asc = !asc;
      else { col = c; asc = false; }
      render();
    }

    function render() {
      var hdr = document.getElementById('hdr');
      hdr.innerHTML = [
        '<th>#</th>',
        '<th onclick="sortBy(\\'fullName\\')">ФИО</th>',
        '<th onclick="sortBy(\\'id\\')">ID</th>',
        '<th onclick="sortBy(\\'birth\\')">Год рожд.</th>',
        '<th onclick="sortBy(\\'rt\\')">Рейтинг</th>'
      ].join('');

      var body = document.querySelector('#tab tbody');
      body.innerHTML = '';

      var sum = 0, cnt = 0;
      for (var i = 0; i < data.length; i++) {
        var n = parseFloat(data[i].rt);
        if (!isNaN(n)) {
          sum += n;
          cnt++;
        }
      }

      var avg = cnt ? Math.round(sum / cnt) : 0;
      document.getElementById('avg').textContent =
        'Средний рейтинг: ' + avg + ' (участников: ' + data.length + ')';

      data
        .slice()
        .sort(function(a, b) {
          var A = a[col] || '';
          var B = b[col] || '';
          var nA = parseFloat(A), nB = parseFloat(B);

          if (!isNaN(nA) && !isNaN(nB)) {
            return asc ? nA - nB : nB - nA;
          }

          A = A.toString();
          B = B.toString();
          return A < B ? (asc ? -1 : 1) : A > B ? (asc ? 1 : -1) : 0;
        })
        .forEach(function(p, i) {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.id || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.rt || '') + '</td>' +
            '</tr>'
          );
        });
    }

    window.onload = render;
  </script>
</body>
</html>


<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лагерь — список участников</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #ffffff;
      color: #222;
    }
    h2 {
      text-align: center;
      margin-bottom: 8px;
    }
    #avg {
      text-align: center;
      margin-top: 6px;
      font-weight: 600;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f4f4f4;
      cursor: pointer;
      user-select: none;
    }
    th:hover {
      background: #ebebeb;
    }
    @media(max-width:480px){
      body {
        font-size: 12px;
        padding: 10px;
      }
      th, td {
        padding: 4px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <h2>Смена 21-21.06.2026</h2>
  <div id="avg"></div>

  <table id="tab">
    <thead>
      <tr id="hdr"></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    var data = [{"group":"Смена 21-21.06.2026","fullName":"Симонов  Михей  Андреевич","birth":"2012","id":"477943","rt":"1623"},{"group":"Смена 21-21.06.2026","fullName":"Сорокин Виктор Алексеевич","birth":"2011","id":"598010","rt":"1558"},{"group":"Смена 21-21.06.2026","fullName":"Борисов Максим Антонович","birth":"2016","id":"623921","rt":"1498"},{"group":"Смена 21-21.06.2026","fullName":"Алимов Кирилл Антонович","birth":"2017","id":"521960","rt":"1417"},{"group":"Смена 21-21.06.2026","fullName":"Фесенко Иван Олегович","birth":"2015","id":"703775","rt":"1379"},{"group":"Смена 21-21.06.2026","fullName":"Коршунов  Иван  Андреевич","birth":"2018","id":"673486","rt":"1354"},{"group":"Смена 21-21.06.2026","fullName":"Шпаковский Арсений Олегович","birth":"2014","id":"511207","rt":"1298"},{"group":"Смена 21-21.06.2026","fullName":"Перов Виктор  Владимирович","birth":"2015","id":"566220","rt":"1290"},{"group":"Смена 21-21.06.2026","fullName":"Рубайлов Дмитрий Михайлович","birth":"2014","id":"475337","rt":"1234"},{"group":"Смена 21-21.06.2026","fullName":"Потапов Иван Алексеевич","birth":"2016","id":"743583","rt":"1230"},{"group":"Смена 21-21.06.2026","fullName":"Леготин Игорь Георгиевич","birth":"2013","id":"468075","rt":"1165"},{"group":"Смена 21-21.06.2026","fullName":"Наркевич  Елизавета  Леонидовна","birth":"2015","id":"762305","rt":"1139"},{"group":"Смена 21-21.06.2026","fullName":"Згурская Варвара Николаевна","birth":"2018","id":"769384","rt":"1090"},{"group":"Смена 21-21.06.2026","fullName":"Ларин Александр Артемович","birth":"2015","id":"491499","rt":"1079"},{"group":"Смена 21-21.06.2026","fullName":"Бултаева Лайна Руслановна","birth":"0.14","id":"469835","rt":"1077"},{"group":"Смена 21-21.06.2026","fullName":"Козаев Тамерлан Георгиевич","birth":"2013","id":"697598","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Корковидов Сергей Вадимович","birth":"2018","id":"","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Первакова Алёна Денисовна","birth":"2018","id":"561633","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Дука  Михаил  Юрьевич","birth":"2015","id":"","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Пахомов Эйтан Михайлович","birth":"2018","id":"","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Пахомов Натан Михаилович","birth":"2020","id":"","rt":"1000"},{"group":"Смена 21-21.06.2026","fullName":"Черняева София Андреевна","birth":"2015","id":"749357","rt":"1000"}];
    var col = 'rt';
    var asc = false;

    function sortBy(c) {
      if (col === c) {
        asc = !asc;
      } else {
        col = c;
        asc = false;
      }
      render();
    }

    function render() {
      var hdr = document.getElementById('hdr');
      hdr.innerHTML = [
        '<th>#</th>',
        '<th onclick="sortBy(\'fullName\')">ФИО</th>',
        '<th onclick="sortBy(\'id\')">ID</th>',
        '<th onclick="sortBy(\'birth\')">Год рожд.</th>',
        '<th onclick="sortBy(\'rt\')">Рейтинг</th>'
      ].join('');

      var body = document.querySelector('#tab tbody');
      body.innerHTML = '';

      var sum = 0, cnt = 0;
      for (var i = 0; i < data.length; i++) {
        var n = parseFloat(data[i].rt);
        if (!isNaN(n)) {
          sum += n;
          cnt++;
        }
      }

      var avg = cnt ? Math.round(sum / cnt) : 0;
      document.getElementById('avg').textContent =
        'Средний рейтинг: ' + avg + ' (участников: ' + data.length + ')';

      data
        .slice()
        .sort(function(a, b) {
          var A = a[col] || '';
          var B = b[col] || '';
          var nA = parseFloat(A), nB = parseFloat(B);

          if (!isNaN(nA) && !isNaN(nB)) {
            return asc ? nA - nB : nB - nA;
          }

          return A < B ? (asc ? -1 : 1) : A > B ? (asc ? 1 : -1) : 0;
        })
        .forEach(function(p, i) {
          body.insertAdjacentHTML(
            'beforeend',
            '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + (p.fullName || '') + '</td>' +
              '<td>' + (p.id || '') + '</td>' +
              '<td>' + (p.birth || '') + '</td>' +
              '<td>' + (p.rt || '') + '</td>' +
            '</tr>'
          );
        });
    }

    window.onload = render;
  </script>
</body>
</html>
